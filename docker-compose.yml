# Production-equivalent service topology for local development.
#
# Optional backing services (redis, postgres, mailhog, minio) are gated behind
# Compose *profiles*, so this one file covers every combination without
# conditional generation. Activate the ones you need:
#
#   COMPOSE_PROFILES=redis,postgres docker compose up
#
# or persist your selection in .env.local:
#
#   COMPOSE_PROFILES=
#
# `docker compose up` with no -f flags auto-merges docker-compose.override.yml
# (dev hot reload). For CI, layer docker-compose.ci.yml explicitly.

services:
  app:
    build:
      context: .
    image: ${IMAGE_NAME:-app}:${IMAGE_TAG:-local}
    ports:
      - "3000:3000"
    # Long-form env_file with required: false (Docker Compose v2.24.0+) so a
    # missing .env.local doesn't hard-fail the first run before you create it.
    env_file:
      - path: .env.local
        required: false
    environment:
      NODE_ENV: production
      PORT: "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  # --- redis: cache / rate-limiting / BullMQ broker -------------------------
  redis:
    profiles: ["redis"]
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- postgres: relational store (e.g. Supabase + Drizzle locally) ---------
  postgres:
    profiles: ["postgres"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- mailhog: captures outbound email in dev (magic-link, notifications) --
  mailhog:
    profiles: ["mailhog"]
    image: mailhog/mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI → http://localhost:8025
    restart: unless-stopped

  # --- minio: S3-compatible object storage for local dev --------------------
  minio:
    profiles: ["minio"]
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console → http://localhost:9001
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
  minio-data:
