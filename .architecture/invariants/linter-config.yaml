# Rules for @hexagen-monaco/arch-linter
# Template: modular-monolith (flexible mode)

global_whitelist:
  - "@vellum/shared"
  - "@vellum/shared/**"
  # scene-types is the contracts kernel — the manifest permits importing it
  # in any plane without restriction (schemas + inferred types, no runtime
  # logic beyond zod parsing).
  - "@vellum/scene-types"
  - "@vellum/scene-types/**"
  # ui is the design-system leaf — presentational components consumed by apps
  # and UI-bearing packages; no internal deps of its own.
  - "@vellum/ui"
  - "@vellum/ui/**"

test_double_rules:
  allowed_cross_package_imports: true
