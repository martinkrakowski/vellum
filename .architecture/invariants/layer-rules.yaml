# HexaGen — Architectural Invariants
# Template: modular-monolith (flexible mode)

shared_kernel:
  package: "@vellum/shared"
  allowed_in_all_layers: true

layers:
  domain:
    access_rule: "internal-only"
    allowed_imports: ["@vellum/shared", "@vellum/scene-types"]

  application:
    access_rule: "ports-only"
    allowed_imports: ["domain", "@vellum/shared", "@vellum/scene-types"]

  infrastructure:
    access_rule: "adapters"
    allowed_imports: ["domain", "application", "@vellum/shared", "@vellum/scene-types"]
