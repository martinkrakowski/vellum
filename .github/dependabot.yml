version: 2
# Security-only mode. `open-pull-requests-limit: 0` disables *version-update*
# PRs (the weekly "bump X to latest" noise); Dependabot *security* updates are
# controlled separately (repo → Settings → Code security) and are unaffected —
# they still open PRs for advisories regardless of this limit.
#
# Why: on a fresh repo every dependency is "behind latest" at once, so version
# updates open a wave of PRs — and majors (Tailwind 4, Next 16, ESLint 10, TS 6)
# arrive individually and break the build if merged. Until the project wants a
# deliberate dependency-refresh pass, only security advisories are worth acting
# on. To re-enable grouped version updates, raise the limits and restore the
# `groups:` blocks from git history.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
