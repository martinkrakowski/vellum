name: Deploy to VPS

# Production deploy on every merge to main via SSH + pull/build/restart.
# Minimal-infrastructure option for a plain VPS running pm2.
#
# TODO: add in GitHub repo → Settings → Secrets and variables → Actions:
#   - VPS_HOST     (secret)  hostname or IP
#   - VPS_USER     (secret)  ssh user
#   - VPS_SSH_KEY  (secret)  private key with deploy access
on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/app
            git pull origin main
            yarn install --immutable
            yarn build
            pm2 restart app
